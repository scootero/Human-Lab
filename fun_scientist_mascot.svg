<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fun Mad Scientist Mascot</title>
  <desc id="desc">A playful cartoon scientist mascot with wild gray hair, big eyes, mustache, lab coat, blue shirt, and red tie.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="skin" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F7C7AE"/>
      <stop offset="1" stop-color="#E9A88F"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" x2="1">
      <stop offset="0" stop-color="#BFC2C5"/>
      <stop offset="1" stop-color="#777B80"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="#0A0B10"/>

  <!-- lightning hair -->
  <g filter="url(#softShadow)" stroke="#050505" stroke-width="12" stroke-linejoin="round">
    <path d="M305 305 L196 252 L260 245 L212 183 L306 208 L292 140 L366 267 Z" fill="url(#hair)"/>
    <path d="M719 305 L828 252 L764 245 L812 183 L718 208 L732 140 L658 267 Z" fill="url(#hair)"/>
  </g>

  <!-- shoulders and coat -->
  <g stroke="#050505" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
    <path d="M155 805 C235 690 336 658 512 658 C688 658 789 690 869 805 L770 895 C690 930 614 945 512 945 C410 945 334 930 254 895 Z" fill="#FFFFFF"/>
    <path d="M386 693 L326 874 L467 945 L512 742 Z" fill="#FFFFFF"/>
    <path d="M638 693 L698 874 L557 945 L512 742 Z" fill="#FFFFFF"/>
    <path d="M415 710 L485 780 L448 945" fill="none"/>
    <path d="M609 710 L539 780 L576 945" fill="none"/>
    <path d="M438 710 L512 752 L586 710 L562 668 L512 699 L462 668 Z" fill="#00A8CF"/>
    <path d="M512 752 C536 794 552 858 548 945 L476 945 C472 858 488 794 512 752 Z" fill="#D90000"/>
    <ellipse cx="512" cy="795" rx="38" ry="55" fill="#E00000"/>
    <path d="M728 890 L733 820"/>
    <path d="M764 878 L767 829"/>
  </g>

  <!-- head and ears -->
  <g stroke="#050505" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="305" cy="474" rx="52" ry="82" fill="url(#skin)"/>
    <ellipse cx="719" cy="474" rx="52" ry="82" fill="url(#skin)"/>
    <path d="M512 158 C652 158 718 272 718 456 C718 608 638 684 512 684 C386 684 306 608 306 456 C306 272 372 158 512 158 Z" fill="url(#skin)"/>
  </g>

  <!-- eyes -->
  <g stroke="#050505" stroke-width="10" stroke-linejoin="round">
    <path d="M397 306 C448 278 500 300 512 358 C524 300 576 278 627 306 C682 338 682 454 612 509 C557 550 523 509 512 459 C501 509 467 550 412 509 C342 454 342 338 397 306 Z" fill="#FFFFFF"/>
    <ellipse cx="446" cy="423" rx="43" ry="56" fill="#050505"/>
    <ellipse cx="578" cy="423" rx="43" ry="56" fill="#050505"/>
  </g>

  <!-- nose -->
  <g stroke="#050505" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="512" cy="514" rx="82" ry="109" fill="#EFB79F"/>
    <path d="M554 455 C574 467 585 482 592 500" stroke="#FFE1D5" stroke-width="16" fill="none" opacity="0.8"/>
  </g>

  <!-- mustache -->
  <g stroke="#050505" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" fill="url(#hair)">
    <path d="M503 628 C442 591 346 604 251 654 C326 658 346 636 393 652 C421 662 462 660 503 628 Z"/>
    <path d="M521 628 C582 591 678 604 773 654 C698 658 678 636 631 652 C603 662 562 660 521 628 Z"/>
  </g>

  <!-- eyebrows / expression -->
  <g stroke="#050505" stroke-width="11" stroke-linecap="round">
    <path d="M396 375 C429 354 466 354 493 378" fill="none"/>
    <path d="M531 378 C558 354 595 354 628 375" fill="none"/>
    <path d="M452 626 C482 648 542 648 572 626" fill="none"/>
  </g>
</svg>
